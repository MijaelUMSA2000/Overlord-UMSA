<!DOCTYPE html>

    <meta charset="UTF-8">
    <title>Recursos - Overlord UMSA</title>
    <link rel="stylesheet" href="../css/estilo.css">
    <style>
        body {
            /* Usamos el fondo de la biblioteca para mantener la estética */
            background-image: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.8)), 
                              url('../img/overlord_wallpaper_hd_overlord_so_bin_art_hd_wallp_by_resourcedirectory_de02f5s-pre.jpg') !important;
            background-size: cover !important;
            background-position: center !important;
            background-attachment: fixed !important;
            display: flex;
            margin: 0;
            color: #eeeeee;
        }

        .contenido-principal {
            margin-left: 240px !important;
            width: calc(100% - 240px) !important;
            padding: 50px !important;
            min-height: 100vh;
            box-sizing: border-box;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: #d4af37;
            text-align: center;
            border-bottom: 2px solid #d4af37;
            padding-bottom: 15px;
        }

        .grid-recursos {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .tarjeta-recurso {
            text-align: center;
            background: rgba(30, 30, 30, 0.5);
            padding: 20px;
            border: 1px solid #d4af37;
            transition: 0.3s;
        }

        .tarjeta-recurso:hover {
            transform: translateY(-10px);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .img-recurso {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .tarjeta-recurso span {
            display: block;
            color: #d4af37;
            font-family: 'Cinzel', serif;
            font-weight: bold;
        }
    </style>
</head>
